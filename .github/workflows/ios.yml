name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve simulator destination
        run: |
          DEST=$(python3 -c "
          import json, subprocess, sys
          result = subprocess.run(['xcrun', 'simctl', 'list', 'devices', 'available', '-j'], capture_output=True, text=True)
          data = json.loads(result.stdout)
          best = None
          for runtime, devices in data['devices'].items():
              if 'com.apple.CoreSimulator.SimRuntime.iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d['name']:
                      if best is None or runtime > best[0]:
                          best = (runtime, d['name'])
          if best:
              print('platform=iOS Simulator,OS=latest,name=' + best[1])
          else:
              print('platform=iOS Simulator,OS=latest,name=iPhone 16')
          ")
          echo "DESTINATION=$DEST" >> "$GITHUB_ENV"
          echo "Selected destination: $DEST"

      - name: Set runtime config defaults
        env:
          SECRET_SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SECRET_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SECRET_PUBLIC_SHARING_BASE_URL: ${{ secrets.PUBLIC_SHARING_BASE_URL }}
        run: |
          echo "SUPABASE_PROJECT_URL=${SECRET_SUPABASE_PROJECT_URL:-https://example.supabase.co}" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=${SECRET_SUPABASE_ANON_KEY:-ci-anon-key}" >> "$GITHUB_ENV"
          echo "PUBLIC_SHARING_BASE_URL=${SECRET_PUBLIC_SHARING_BASE_URL:-https://example.com}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project CathedralOSApp.xcodeproj \
            -scheme CathedralOSApp \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
